# Render Blueprint for EdgeFlow Backend
# https://render.com/docs/blueprint-spec
# Deploy: connect this repo to Render and it will read this file automatically.

services:
  - type: web
    name: edgeflow-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: edgeflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: edgeflow-redis
          property: connectionString
      - key: REDIS_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://edgeflow-frontend.vercel.app,http://localhost:5173
      - key: SEED_ADMIN_EMAIL
        value: admin@edgeflow.dev
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: EdgeFlow Admin
      - key: TRUST_PROXY
        value: "1"

databases:
  - name: edgeflow-db
    databaseName: edgeflow
    plan: free

  - type: redis
    name: edgeflow-redis
    plan: free
    ipAllowList: []
