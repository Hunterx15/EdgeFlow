# EdgeFlow - Docker Compose
#
# Boots the entire stack with a single command:
#   docker compose up --build
#
# Services:
#   - postgres       : PostgreSQL 16
#   - redis          : Redis 7 (cache + rate-limit store)
#   - backend        : EdgeFlow Node.js gateway (port 4000)
#   - frontend       : nginx serving the React dashboard (port 8080)
#   - demo-service   : tiny Express mock for immediate /gateway/* testing

services:
  postgres:
    image: postgres:16-alpine
    container_name: edgeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edgeflow
      POSTGRES_PASSWORD: edgeflow
      POSTGRES_DB: edgeflow
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgeflow -d edgeflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: edgeflow-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports: ["6379:6379"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: edgeflow-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://edgeflow:edgeflow@postgres:5432/edgeflow
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Generate with: openssl rand -hex 64}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required. Generate with: openssl rand -hex 64}
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:3000
      SEED_ADMIN_EMAIL: admin@edgeflow.dev
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_ADMIN_NAME: EdgeFlow Admin
    ports: ["4000:4000"]
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: edgeflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  demo-service:
    build:
      context: ./docker/demo-service
      dockerfile: Dockerfile
    container_name: edgeflow-demo-service
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  redis_data:
  backend_logs:
